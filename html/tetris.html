<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Tetris Pinky</title>
    <link rel="stylesheet" href="../css/tetris.css">
</head>
<body>

<div class="container">

    <div class="score">
        Puntaje <span id="score">0</span>
    </div>

    <canvas id="tetris" width="240" height="480"></canvas>

    <div class="panel">
        <button id="restart">Reiniciar</button>
        <button id="menu" class="menuBtn">Inicio</button>
    </div>

</div>

<div class="controls">
    <button id="left">◀</button>
    <button id="rotate">⟳</button>
    <button id="down">▼</button>
    <button id="right">▶</button>
</div>

<!-- MODAL GAME OVER -->
<div id="modalGameOver" class="modal oculto">
    <div class="ventana">
        <h2>Game Over</h2>
        <p>Puntaje final:</p>
        <p id="puntajeFinal" class="puntaje-final"></p>
        <div class="botonesModal">
            <button id="btnReiniciar">Intentar de nuevo</button>
            <button onclick="location.href='../index.html'">Menú Principal</button>
        </div>
    </div>
</div>

<script src="../js/tetris.js"></script>

</body>
</html>
